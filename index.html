<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Ticket Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎟️ Ticket Booking System</h1>

<div class="container">
    <label>Name:</label>
    <input type="text" id="name">

    <label>Movie/Event:</label>
    <select id="event">
        <option>Movie A</option>
        <option>Movie B</option>
        <option>Concert</option>
    </select>

    <label>Seats:</label>
    <input type="number" id="seats">

    <button onclick="bookTicket()">Book Ticket</button>
</div>

<h2 id="result"></h2>

<script src="script.js"></script>
</body>
</html>
